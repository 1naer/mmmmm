name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Prepare APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/mmm-debug.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmm-debug-apk
          path: release/mmm-debug.apk
          if-no-files-found: error

      - name: Publish latest debug APK release
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          tag: debug-latest
          name: Latest Debug APK
          body: |
            Automatically generated debug APK from the latest main branch build.

            Commit: ${{ github.sha }}
          artifacts: release/mmm-debug.apk
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
