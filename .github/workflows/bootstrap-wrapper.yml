name: Bootstrap Gradle Wrapper

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap-wrapper:
    if: ${{ !contains(github.event.head_commit.message, '[skip bootstrap]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Generate Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.10.2

      - name: Commit wrapper jar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties gradlew gradlew.bat
          if git diff --cached --quiet; then
            echo "No wrapper changes to commit."
          else
            git commit -m "chore: add gradle wrapper jar [skip bootstrap]"
            git push
          fi
